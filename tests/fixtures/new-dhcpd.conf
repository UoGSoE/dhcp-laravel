####### Global options ############

authoritative;


option subnet-mask		 	255.255.255.0;
option domain-name-servers	130.209.176.24, 130.209.12.207, 130.209.176.9, 130.209.176.2, 130.209.16.6;
#option domain-name-servers     130.209.12.207, 130.209.176.9, 130.209.176.2, 130.209.16.6;
#option netbios-name-servers 130.209.176.9, 130.209.12.193;
 
option wpad code 252 = text;
option wpad "\n\000";

deny unknown-clients;	
ddns-update-style	none;

#server-name "pixie.eng-ad.gla.ac.uk";
#server-name "leprechaun.eng-ad.gla.ac.uk";
#filename "\\boot\\x64\\pxelinux.com";
#next-server 130.209.176.18;

option arch code 93 = unsigned integer 16;
if option arch = 00:07 or option arch = 00:09 {
      server-name "pixie.eng-ad.gla.ac.uk";
#      server-name "leprechaun.eng.gla.ac.uk";
      filename "ipxe.efi";
#      next-server 172.20.176.16;
      next-server 130.209.176.18;
} else {
      server-name "pixie.eng-ad.gla.ac.uk";
#      filename "\\boot\\x64\\pxelinux.com";
#      next-server 130.209.176.18;
#      server-name "leprechaun.eng.gla.ac.uk";
      filename "undionly.kpxe";
#      next-server 172.20.176.16;
      next-server 130.209.176.18;
}

max-lease-time 900;
default-lease-time 900;

# set specific syslog type so can be filtered more easily on the loghost (davdi.eng)
log-facility local0;

